# Serve the built SPA. Any unknown path falls back to index.html so client-side
# routing (React Router) works on deep links and refreshes. (T-23A)
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted build assets; never cache the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
