name: CI/CD

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

jobs:
  validate:
    name: Validate frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Run build
        run: npm run build

  deploy-dev:
    name: Deploy dev placeholder
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    steps:
      - name: Placeholder dev deployment
        run: echo "Dev deployment placeholder. Configure hosting details and GitHub Actions secrets before enabling real deployment."

  deploy-prod:
    name: Deploy production placeholder
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Placeholder production deployment
        run: echo "Production deployment placeholder. Configure hosting details and GitHub Actions secrets before enabling real deployment."
